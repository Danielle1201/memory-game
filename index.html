<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספרא בבתים | משחק הזיכרון - חיות</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-back: #3498db;
            --card-front: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
            color: #2980b9;
        }

        .stats {
            margin-bottom: 20px;
            font-size: 1.2rem;
            display: flex;
            gap: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .game-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 480px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            aspect-ratio: 1/1;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 12px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            box-shadow: 0 0 15px var(--accent-color);
            border: 2px solid var(--accent-color);
            cursor: default;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 3rem;
        }

        .card-back {
            background-color: var(--card-back);
            color: white;
            background-image: radial-gradient(circle, #ffffff22 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
        }

        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 1.1rem;
            background-color: var(--card-back);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }

        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            display: none;
            z-index: 100;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <h1>משחק הזיכרון: עולם החיות 🦁</h1>

    <div class="stats">
        <div>מהלכים: <span id="moves">0</span></div>
        <div>זמן: <span id="timer">00:00</span></div>
    </div>

    <div class="game-grid" id="grid"></div>

    <button onclick="resetGame()">משחק חדש</button>

    <div class="overlay" id="overlay"></div>
    <div class="message-box" id="msgBox">
        <h2 id="winTitle">כל הכבוד! 🎉</h2>
        <p id="winText"></p>
        <button onclick="resetGame()">שחק שוב</button>
    </div>

    <script>
        const animals = ['🦁', '🐘', '🦒', '🦓', '🐒', '🐯', '🐼', '🦊', '🐸', '🐧', '🐢', '🦋'];
        let cards = [...animals, ...animals];
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let timerSeconds = 0;
        let timerInterval = null;
        let isLock = false;

        const grid = document.getElementById('grid');
        const movesEl = document.getElementById('moves');
        const timerEl = document.getElementById('timer');
        const msgBox = document.getElementById('msgBox');
        const overlay = document.getElementById('overlay');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function createBoard() {
            grid.innerHTML = '';
            shuffle(cards);
            cards.forEach((animal, index) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.animal = animal;
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front">${animal}</div>
                    </div>
                `;
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (isLock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            if (moves === 0 && !timerInterval) startTimer();

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            isLock = true;
            moves++;
            movesEl.textContent = moves;

            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.animal === card2.dataset.animal;

            if (isMatch) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount++;
                flippedCards = [];
                isLock = false;

                if (matchedCount === animals.length) {
                    endGame();
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLock = false;
                }, 1000);
            }
        }

        function startTimer() {
            timerSeconds = 0;
            timerInterval = setInterval(() => {
                timerSeconds++;
                const mins = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
                const secs = (timerSeconds % 60).toString().padStart(2, '0');
                timerEl.textContent = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function endGame() {
            stopTimer();
            const timeStr = timerEl.textContent;
            document.getElementById('winText').innerText = `סיימת את המשחק ב-${moves} מהלכים ובזמן של ${timeStr}!`;
            msgBox.style.display = 'block';
            overlay.style.display = 'block';
        }

        function resetGame() {
            stopTimer();
            moves = 0;
            matchedCount = 0;
            flippedCards = [];
            isLock = false;
            timerSeconds = 0;
            movesEl.textContent = '0';
            timerEl.textContent = '00:00';
            msgBox.style.display = 'none';
            overlay.style.display = 'none';
            createBoard();
        }

        // Init
        window.onload = createBoard;
    </script>
</body>
</html>
